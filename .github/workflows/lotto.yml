name: Lotto win alert

on:
  schedule:
    # NZ Lotto draws Wed + Sat at 20:20 NZ time.
    # NZST (winter) = UTC+12: 20:20 NZST = 08:20 UTC
    # NZDT (summer) = UTC+13: 20:20 NZDT = 07:20 UTC
    # Two firings per draw day cover both seasons + API latency. Idempotent.
    - cron: "0 9 * * 3,6"   # 09:00 UTC Wed/Sat = 21:00 NZST or 22:00 NZDT
    - cron: "0 10 * * 3,6"  # 10:00 UTC Wed/Sat = 22:00 NZST or 23:00 NZDT
  workflow_dispatch:        # manual trigger for testing

permissions:
  contents: write           # needed to commit seen_draws.json back

concurrency:
  group: lotto-alert
  cancel-in-progress: false

jobs:
  check:
    # Don't run on a schedule in the template repo itself (it has no config + would
    # fail/spam). Repos created via "Use this template" have a different name, so
    # this guard lets the scheduled job run normally there.
    if: github.repository != 'mouarg/lotto-alert-template'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Write config.json from secret
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: |
          if [ -z "$CONFIG_JSON" ]; then
            echo "::error::CONFIG_JSON secret is not set. Add your syndicate config.json content as a repo secret named CONFIG_JSON."
            exit 1
          fi
          printf '%s' "$CONFIG_JSON" > config.json

      - name: Check draw and alert
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          CALLMEBOT_PHONE_2: ${{ secrets.CALLMEBOT_PHONE_2 }}
          CALLMEBOT_APIKEY_2: ${{ secrets.CALLMEBOT_APIKEY_2 }}
          CALLMEBOT_PHONE_3: ${{ secrets.CALLMEBOT_PHONE_3 }}
          CALLMEBOT_APIKEY_3: ${{ secrets.CALLMEBOT_APIKEY_3 }}
          CALLMEBOT_PHONE_4: ${{ secrets.CALLMEBOT_PHONE_4 }}
          CALLMEBOT_APIKEY_4: ${{ secrets.CALLMEBOT_APIKEY_4 }}
        run: python check_draw.py

      - name: Commit updated state
        run: |
          git add seen_draws.json totals.json draws.csv alert.log 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "state: draw checked at $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
