name: Weekly heartbeat

on:
  schedule:
    # Sat 20:00 UTC = Sun 08:00 NZST (winter) / Sun 09:00 NZDT (summer)
    # Runs ~10h after the latest Sat draw check, well after results post.
    - cron: "0 20 * * 6"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lotto-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    # Skip the scheduled run in the template repo itself; runs normally in repos
    # created from the template (which have a different repository name).
    if: github.repository != 'mouarg/lotto-alert-template'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Write config.json from secret
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: |
          if [ -z "$CONFIG_JSON" ]; then
            echo "::error::CONFIG_JSON secret is not set. Add your syndicate config.json content as a repo secret named CONFIG_JSON."
            exit 1
          fi
          printf '%s' "$CONFIG_JSON" > config.json

      - name: Send heartbeat
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          CALLMEBOT_PHONE_2: ${{ secrets.CALLMEBOT_PHONE_2 }}
          CALLMEBOT_APIKEY_2: ${{ secrets.CALLMEBOT_APIKEY_2 }}
          CALLMEBOT_PHONE_3: ${{ secrets.CALLMEBOT_PHONE_3 }}
          CALLMEBOT_APIKEY_3: ${{ secrets.CALLMEBOT_APIKEY_3 }}
          CALLMEBOT_PHONE_4: ${{ secrets.CALLMEBOT_PHONE_4 }}
          CALLMEBOT_APIKEY_4: ${{ secrets.CALLMEBOT_APIKEY_4 }}
        run: python heartbeat.py
